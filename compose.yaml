services:
  api:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: http://localhost:8080
      TRUST_PROXY: "false"
    ports:
      - "5000:5000"
    restart: unless-stopped

  web:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
